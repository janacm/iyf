name: AI Security Review

on:
  pull_request_target:
    types:
      - opened
      - reopened
      - synchronize
      - ready_for_review

permissions:
  contents: read
  issues: write
  pull-requests: read

concurrency:
  group: ai-security-review-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  review:
    name: Review PR diff
    runs-on: ubuntu-latest
    steps:
      - name: Check out trusted workflow scripts
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.base.sha }}
          persist-credentials: false

      - name: Run AI security review
        env:
          GITHUB_TOKEN: ${{ github.token }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          SECURITY_REVIEW_MODEL: ${{ vars.AI_SECURITY_REVIEW_MODEL }}
          SECURITY_REVIEW_MAX_DIFF_BYTES: ${{ vars.AI_SECURITY_REVIEW_MAX_DIFF_BYTES }}
          SECURITY_REVIEW_MAX_OUTPUT_TOKENS: ${{ vars.AI_SECURITY_REVIEW_MAX_OUTPUT_TOKENS }}
        run: python3 .github/scripts/ai_security_review.py
