<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Command Finished</title>
<style>
  *, *::before, *::after {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  html, body {
    height: 100%;
    width: 100%;
    overflow: hidden;
    background: #0a0a0f;
    color: #e4e4e7;
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    display: flex;
    align-items: center;
    justify-content: center;
    user-select: none;
    cursor: pointer;
  }

  body {
    background: radial-gradient(ellipse at 50% 40%, rgba(99, 102, 241, 0.06) 0%, transparent 60%),
                radial-gradient(ellipse at 70% 60%, rgba(168, 85, 247, 0.04) 0%, transparent 50%),
                #0a0a0f;
  }

  .container {
    text-align: center;
    padding: 2rem;
    animation: fadeIn 0.4s ease-out;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: scale(0.96); }
    to   { opacity: 1; transform: scale(1); }
  }

  .icon {
    font-size: 6rem;
    line-height: 1;
    margin-bottom: 1.5rem;
    display: block;
    animation: pulse-glow 2s ease-in-out infinite;
  }

  @keyframes pulse-glow {
    0%, 100% { filter: drop-shadow(0 0 20px rgba(99, 102, 241, 0.3)); }
    50%      { filter: drop-shadow(0 0 40px rgba(99, 102, 241, 0.7)); }
  }

  .title {
    font-size: 3.5rem;
    font-weight: 700;
    letter-spacing: -0.02em;
    margin-bottom: 0.5rem;
    background: linear-gradient(135deg, #e4e4e7 0%, #a1a1aa 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .subtitle {
    font-size: 1.1rem;
    color: #71717a;
    margin-bottom: 2.5rem;
    font-weight: 400;
  }

  .cmd-box {
    background: rgba(39, 39, 42, 0.8);
    border: 1px solid rgba(63, 63, 70, 0.6);
    border-radius: 12px;
    padding: 1.25rem 2rem;
    display: inline-flex;
    align-items: center;
    gap: 0.75rem;
    max-width: 90vw;
    margin-bottom: 2rem;
    backdrop-filter: blur(6px);
  }

  .cmd-prompt {
    color: #22c55e;
    font-family: "SF Mono", "Fira Code", "Cascadia Code", monospace;
    font-size: 1rem;
    font-weight: 500;
  }

  .cmd-text {
    color: #e4e4e7;
    font-family: "SF Mono", "Fira Code", "Cascadia Code", monospace;
    font-size: 1.3rem;
    font-weight: 600;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    max-width: 50vw;
  }

  .meta {
    display: flex;
    gap: 1rem;
    justify-content: center;
    flex-wrap: wrap;
    margin-bottom: 2.5rem;
  }

  .badge {
    display: inline-flex;
    align-items: center;
    gap: 0.4rem;
    padding: 0.4rem 1rem;
    border-radius: 999px;
    font-size: 0.9rem;
    font-weight: 500;
    background: rgba(39, 39, 42, 0.8);
    border: 1px solid rgba(63, 63, 70, 0.5);
    color: #d4d4d8;
  }

  .badge svg {
    width: 14px;
    height: 14px;
  }

  .badge.success { border-color: rgba(34, 197, 94, 0.4); color: #4ade80; }
  .badge.failure { border-color: rgba(239, 68, 68, 0.4); color: #f87171; }

  /* Repo badge: indigo accent to match the theme. Hidden by default — note the
     .badge rule sets display:inline-flex, which would beat the [hidden] UA rule,
     so visibility is toggled with a class instead of the hidden attribute. */
  .badge.repo { border-color: rgba(99, 102, 241, 0.4); color: #c7d2fe; display: none; }
  .badge.repo.is-visible { display: inline-flex; }

  .dismiss-hint {
    color: #52525b;
    font-size: 0.85rem;
    letter-spacing: 0.02em;
  }

  .dismiss-hint kbd {
    display: inline-block;
    padding: 0.15rem 0.5rem;
    border-radius: 4px;
    background: rgba(63, 63, 70, 0.4);
    border: 1px solid rgba(82, 82, 91, 0.3);
    font-family: "SF Mono", monospace;
    font-size: 0.8rem;
    color: #a1a1aa;
  }

  .snooze {
    margin-top: 2rem;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 0.6rem;
    flex-wrap: wrap;
  }

  .snooze-label {
    display: inline-flex;
    align-items: center;
    gap: 0.4rem;
    color: #71717a;
    font-size: 0.9rem;
    font-weight: 500;
  }

  .snooze-label svg { width: 15px; height: 15px; }

  .snooze-btn {
    appearance: none;
    cursor: pointer;
    font: inherit;
    font-size: 0.95rem;
    font-weight: 600;
    color: #c7d2fe;
    padding: 0.45rem 1.05rem;
    border-radius: 999px;
    background: rgba(99, 102, 241, 0.1);
    border: 1px solid rgba(99, 102, 241, 0.35);
    transition: background 0.15s ease, border-color 0.15s ease, transform 0.1s ease;
  }

  .snooze-btn:hover {
    background: rgba(99, 102, 241, 0.22);
    border-color: rgba(129, 140, 248, 0.7);
  }

  .snooze-btn:active { transform: scale(0.95); }

  .progress-ring {
    position: fixed;
    bottom: 0;
    left: 0;
    height: 3px;
    background: linear-gradient(90deg, rgba(99, 102, 241, 0.5), rgba(168, 85, 247, 0.5));
    transition: width 1s linear;
    width: 100%;
    z-index: 10;
  }

  @media (prefers-reduced-motion: reduce) {
    .icon { animation: none; }
    .container { animation: none; }
  }
</style>
</head>
<body>

<div class="container" id="app">
  <span class="icon" id="statusIcon">⚡</span>
  <p class="title">Command Finished</p>
  <p class="subtitle">The terminal is ready for you</p>

  <div class="cmd-box">
    <span class="cmd-prompt">$</span>
    <span class="cmd-text" id="cmdDisplay">—</span>
  </div>

  <div class="meta">
    <span class="badge repo" id="repoBadge">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="6" y1="3" x2="6" y2="15"/><circle cx="18" cy="6" r="3"/><circle cx="6" cy="18" r="3"/><path d="M18 9a9 9 0 0 1-9 9"/></svg>
      <span id="repoDisplay"></span>
    </span>
    <span class="badge" id="durationBadge">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
      <span id="durationDisplay">—</span>
    </span>
    <span class="badge success" id="exitBadge">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
      <span id="exitDisplay">—</span>
    </span>
  </div>

  <p class="dismiss-hint" id="dismissHint">Click anywhere or press <kbd>Esc</kbd> to dismiss</p>

  <div class="snooze" id="snoozeBar" hidden>
    <span class="snooze-label">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 8v4l2.5 2.5"/><circle cx="12" cy="13" r="8"/><path d="M5 3 2 6"/><path d="m22 6-3-3"/></svg>
      Snooze
    </span>
  </div>
</div>

<div class="progress-ring" id="progressBar"></div>

<script>
  const params = new URLSearchParams(location.search);

  function decodeBase64Url(value) {
    if (!value) return null;
    try {
      const normalized = value.replace(/-/g, '+').replace(/_/g, '/');
      const padded = normalized + '='.repeat((4 - normalized.length % 4) % 4);
      const bytes = Uint8Array.from(atob(padded), c => c.charCodeAt(0));
      return new TextDecoder().decode(bytes);
    } catch (e) {
      return null;
    }
  }

  function textParam(encodedName, legacyName) {
    const encoded = decodeBase64Url(params.get(encodedName));
    if (encoded !== null) return encoded;

    const value = params.get(legacyName);
    if (value === null) return '';

    // WKWebView loadFileURL can re-escape percent-encoded file:// query values.
    // Decode one extra layer for older launcher URLs that do not include base64.
    if (window.iyfNative && /%[0-9a-f]{2}/i.test(value)) {
      try {
        return decodeURIComponent(value);
      } catch (e) {}
    }
    return value;
  }

  const cmd = textParam('cmdb64', 'cmd') || '—';
  const duration = params.get('duration') || '—';
  const code = params.get('code');

  document.getElementById('cmdDisplay').textContent = cmd;
  document.getElementById('durationDisplay').textContent = duration;

  // Repo name (git toplevel basename, resolved by the launcher). Absent/empty
  // when the command didn't run inside a git repo — leave the badge hidden then.
  const repo = textParam('repob64', 'repo');
  if (repo) {
    document.getElementById('repoDisplay').textContent = repo;
    document.getElementById('repoBadge').classList.add('is-visible');
  }

  if (params.get('snoozed') === '1') {
    document.querySelector('.subtitle').textContent = 'Snoozed reminder · the terminal is ready for you';
  }

  const exitBadge = document.getElementById('exitBadge');
  const exitDisplay = document.getElementById('exitDisplay');
  const statusIcon = document.getElementById('statusIcon');

  if (code === '0') {
    exitDisplay.textContent = 'Exit 0';
    exitBadge.className = 'badge success';
    exitBadge.title = 'Command succeeded';
  } else if (code !== null) {
    exitDisplay.textContent = 'Exit ' + code;
    exitBadge.className = 'badge failure';
    exitBadge.title = 'Command failed';
    statusIcon.textContent = '✕';
    document.querySelector('.title').textContent = 'Command Failed';
    document.querySelector('.title').style.background = 'linear-gradient(135deg, #f87171 0%, #ef4444 100%)';
    document.querySelector('.title').style.webkitBackgroundClip = 'text';
    document.querySelector('.title').style.webkitTextFillColor = 'transparent';
  }

  // Snooze/focus talks to the detached daemon iyf-show-alert.sh spawned for us.
  // It's a no-cors fetch so the opaque file:// origin can reach loopback; we
  // never read the (opaque) response, we only need the request to land. keepalive
  // lets it complete even as the window closes a beat later.
  const sport = params.get('sport');
  const stoken = params.get('stoken');
  const daemonEnabled = Boolean(sport && stoken);
  const snoozeEnabled = params.get('snooze') === '1' && daemonEnabled;
  const focusEnabled = params.get('focus') === '1' && daemonEnabled;

  if (focusEnabled) {
    const focusName = textParam('focusnameb64', 'focusname');
    const hint = document.getElementById('dismissHint');
    hint.textContent = 'Click anywhere to return' + (focusName ? ' to ' + focusName : '') + ' or press ';
    const kbd = document.createElement('kbd');
    kbd.textContent = 'Esc';
    hint.appendChild(kbd);
    hint.appendChild(document.createTextNode(' to dismiss'));
  }

  function signal(path) {
    if (!daemonEnabled) return;
    try {
      if (window.webkit?.messageHandlers?.iyfSignal) {
        window.webkit.messageHandlers.iyfSignal.postMessage(path);
        return;
      }
    } catch (e) {}
    try {
      fetch(`http://127.0.0.1:${sport}/${stoken}/${path}`, {
        method: 'GET', mode: 'no-cors', keepalive: true,
      }).catch(() => {});
    } catch (e) {}
  }

  let dismissed = false;
  let decided = false; // a snooze was chosen — don't also fire a dismiss
  function closeWindow() {
    // The native helper replaces window.close() with a WebKit message bridge.
    // Never navigate to dismiss: window.open('','_self') blanks the page to about:blank.
    window.close();
    // Fallback if the OS denies the close: drop to the background so the terminal
    // regains focus, instead of leaving a stuck window on screen.
    setTimeout(() => { window.blur?.(); }, 150);
  }

  function dismiss(action = 'dismiss') {
    if (dismissed || decided) return;
    dismissed = true;
    signal(action); // let the daemon exit promptly instead of waiting out its deadline
    closeWindow();
  }

  function snooze(mins) {
    if (decided || dismissed) return;
    decided = true;
    signal(`snooze/${mins}`);
    document.getElementById('app').innerHTML =
      '<span class="icon">⏰</span>' +
      '<p class="title">Snoozed</p>' +
      '<p class="subtitle">Back in ' + mins + ' minute' + (mins === 1 ? '' : 's') + '</p>';
    setTimeout(closeWindow, 650);
  }

  document.addEventListener('click', () => dismiss(focusEnabled ? 'focus' : 'dismiss'));
  document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape') dismiss('dismiss');
  });

  // Render the snooze options the launcher passed through (IYF_SNOOZE_MINUTES).
  if (snoozeEnabled) {
    const bar = document.getElementById('snoozeBar');
    const mins = (params.get('snoozemins') || '5,10,30,60')
      .split(',').map(n => parseInt(n, 10)).filter(n => Number.isFinite(n) && n > 0);
    for (const m of mins) {
      const btn = document.createElement('button');
      btn.type = 'button';
      btn.className = 'snooze-btn';
      btn.textContent = m + 'm';
      btn.addEventListener('click', (e) => { e.stopPropagation(); snooze(m); });
      bar.appendChild(btn);
    }
    // Clicks on the bar's empty space shouldn't bubble to the dismiss handler.
    bar.addEventListener('click', (e) => e.stopPropagation());
    bar.hidden = false;
  }

  let remaining = parseInt(params.get('autoclose'), 10);
  if (!Number.isFinite(remaining) || remaining <= 0) remaining = 90;
  const total = remaining;
  const progressBar = document.getElementById('progressBar');

  function tick() {
    remaining--;
    if (remaining <= 0) { dismiss('dismiss'); return; }
    progressBar.style.width = (remaining / total * 100) + '%';
    setTimeout(tick, 1000);
  }

  tick();
</script>
</body>
</html>
